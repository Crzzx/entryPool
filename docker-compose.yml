
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: pool_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: pool_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin # так делать нельзя, нужно использовать конфиги, тестово сделал так
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: